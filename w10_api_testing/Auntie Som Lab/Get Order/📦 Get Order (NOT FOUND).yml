info:
  name: 📦 Get Order (NOT FOUND)
  type: http
  seq: 2

http:
  method: GET
  url: "{{localhost}}/orders/ORD-fake12"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        test("Non-existent order should return proper error", () => {
          // ❌ status ผิด
          if (res.getStatus() === 200) {
            throw new Error("Should not return 200 for non-existent order");
          }
        });

        test("Error message should exist", () => {
          if (!body.error) {
            throw new Error("Missing error message");
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
