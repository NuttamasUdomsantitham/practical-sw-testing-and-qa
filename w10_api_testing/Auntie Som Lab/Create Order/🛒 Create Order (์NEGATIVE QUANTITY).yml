info:
  name: 🛒 Create Order (์NEGATIVE QUANTITY)
  type: http
  seq: 6

http:
  method: POST
  url: "{{localhost}}/orders"
  headers:
    - name: Authorization
      value: Bearer <token>
  body:
    type: json
    data: |-
      {
        "itemId": {{itemId}},
        "quantity": -1
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Should reject overstock", () => {
          if (res.getStatus() === 200) {
            throw new Error("Overstock order was allowed");
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
